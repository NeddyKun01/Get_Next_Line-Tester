name: Get Next Line Tester

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:
    inputs:
      gnl_repository:
        description: "Repository to test, for example owner/Get_Next_Line"
        required: false
        type: string

env:
  TARGET_GNL_REPOSITORY: ${{ inputs.gnl_repository || vars.GNL_REPOSITORY }}

jobs:
  tester-smoke-test:
    name: Tester smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tester
        uses: actions/checkout@v4

      - name: Build tester
        run: make build

      - name: Run tester self-test
        run: make self-test

      - name: Show help
        run: ./gnl_tester --help

      - name: Show version and presets
        run: |
          ./gnl_tester --version
          ./gnl_tester --presets

      - name: Create known-good target
        run: |
          mkdir -p fixtures/Get_Next_Line
          cat > fixtures/Get_Next_Line/get_next_line.h <<'EOF'
          #ifndef GET_NEXT_LINE_H
          # define GET_NEXT_LINE_H
          char *get_next_line(int fd);
          #endif
          EOF
          cat > fixtures/Get_Next_Line/get_next_line.c <<'EOF'
          #include "get_next_line.h"
          #include <stdlib.h>
          #include <unistd.h>

          char *get_next_line(int fd)
          {
              char *line;
              char c;
              size_t len;
              ssize_t n;
              char *next;
              size_t i;

              if (fd < 0)
                  return (NULL);
              line = NULL;
              len = 0;
              while ((n = read(fd, &c, 1)) > 0)
              {
                  next = malloc(len + 2);
                  if (!next)
                  {
                      free(line);
                      return (NULL);
                  }
                  i = 0;
                  while (i < len)
                  {
                      next[i] = line[i];
                      i++;
                  }
                  next[len++] = c;
                  next[len] = '\0';
                  free(line);
                  line = next;
                  if (c == '\n')
                      break ;
              }
              if (n < 0 || (n == 0 && len == 0))
              {
                  free(line);
                  return (NULL);
              }
              return (line);
          }
          EOF
          cat > fixtures/Get_Next_Line/get_next_line_utils.c <<'EOF'
          int gnl_ci_dummy(void)
          {
              return (0);
          }
          EOF

      - name: Run smoke suite
        run: ./gnl_tester --root fixtures/Get_Next_Line --preset quick --summary-only --no-color

      - name: Run smoke doctor
        run: ./gnl_tester --root fixtures/Get_Next_Line --doctor

      - name: Run smoke diagnostics
        run: |
          ./gnl_tester --root fixtures/Get_Next_Line --diagnose
          ./gnl_tester --root fixtures/Get_Next_Line --health
          ./gnl_tester --explain stdin

      - name: Run focused smoke case
        run: ./gnl_tester --root fixtures/Get_Next_Line --only stdin --quick --summary-only --no-color

      - name: Run smoke Web report
        run: |
          ./gnl_tester --root fixtures/Get_Next_Line --quick --web --output gnl-smoke-report.html
          grep -q "<!doctype html>" gnl-smoke-report.html

  build-and-test:
    name: Build and test target
    runs-on: ubuntu-latest
    if: ${{ vars.GNL_REPOSITORY != '' || (github.event_name == 'workflow_dispatch' && inputs.gnl_repository != '') }}

    steps:
      - name: Checkout Get Next Line under test
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TARGET_GNL_REPOSITORY }}
          path: Get_Next_Line

      - name: Checkout tester
        uses: actions/checkout@v4
        with:
          path: Get_Next_Line/tester

      - name: Build tester
        working-directory: Get_Next_Line/tester
        run: make build

      - name: Run mandatory strict suite
        working-directory: Get_Next_Line/tester
        run: ./gnl_tester --root .. --strict --summary-only --fail-fast --no-color

      - name: Run target diagnostics
        working-directory: Get_Next_Line/tester
        run: |
          ./gnl_tester --root .. --diagnose
          ./gnl_tester --root .. --health
          ./gnl_tester --root .. --doctor --json --output gnl-doctor.json
          ./gnl_tester --root .. --doctor --web --output gnl-doctor.html

      - name: Run bonus strict suite when available
        working-directory: Get_Next_Line/tester
        run: |
          if [ -f ../get_next_line_bonus.c ] && [ -f ../get_next_line_utils_bonus.c ] && [ -f ../get_next_line_bonus.h ]; then
            ./gnl_tester --root .. --bonus --strict --summary-only --fail-fast --no-color
          else
            echo "Bonus files not found; skipping bonus suite."
          fi

      - name: Run review summary
        if: always()
        working-directory: Get_Next_Line/tester
        run: ./gnl_tester --root .. --review --summary-only --no-color > gnl-review.txt

      - name: Show review summary
        if: always()
        working-directory: Get_Next_Line/tester
        run: cat gnl-review.txt

      - name: Generate JSON report
        if: always()
        working-directory: Get_Next_Line/tester
        run: ./gnl_tester --root .. --preset ci --output gnl-test-report.json

      - name: Show JSON report
        if: always()
        working-directory: Get_Next_Line/tester
        run: cat gnl-test-report.json

      - name: Generate Web report
        if: always()
        working-directory: Get_Next_Line/tester
        run: ./gnl_tester --root .. --preset web --output gnl-test-report.html

      - name: Upload review summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gnl-review
          path: Get_Next_Line/tester/gnl-review.txt
          if-no-files-found: ignore

      - name: Upload JSON report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gnl-json-report
          path: |
            Get_Next_Line/tester/gnl-test-report.json
            Get_Next_Line/tester/gnl-doctor.json
          if-no-files-found: ignore

      - name: Upload Web report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gnl-web-report
          path: |
            Get_Next_Line/tester/gnl-test-report.html
            Get_Next_Line/tester/gnl-doctor.html
          if-no-files-found: ignore

  leaks:
    name: Valgrind leaks
    runs-on: ubuntu-latest
    needs: build-and-test
    if: ${{ vars.GNL_REPOSITORY != '' || (github.event_name == 'workflow_dispatch' && inputs.gnl_repository != '') }}

    steps:
      - name: Checkout Get Next Line under test
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TARGET_GNL_REPOSITORY }}
          path: Get_Next_Line

      - name: Checkout tester
        uses: actions/checkout@v4
        with:
          path: Get_Next_Line/tester

      - name: Install Valgrind
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind

      - name: Build tester
        working-directory: Get_Next_Line/tester
        run: make build

      - name: Run mandatory leak check
        working-directory: Get_Next_Line/tester
        run: ./gnl_tester --root .. --quick --leaks --summary-only --fail-fast --timeout 10000 --no-color

  configuration-help:
    name: Configuration help
    runs-on: ubuntu-latest
    if: ${{ vars.GNL_REPOSITORY == '' && (github.event_name != 'workflow_dispatch' || inputs.gnl_repository == '') }}

    steps:
      - name: Explain missing variable
        run: |
          echo "Set the repository variable GNL_REPOSITORY to run target-project checks automatically."
          echo "Example: OWNER/Get_Next_Line"
          echo "You can also run workflow_dispatch and provide gnl_repository manually."
